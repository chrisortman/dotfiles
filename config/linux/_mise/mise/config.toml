[settings.ruby]
ruby_install = true
compile = false

[tools]
age = "latest"
claude = "latest"
docker-compose = "latest"
fnox = "latest"
fzf = "latest"
"github:anomalyco/opencode" = "latest"
glab = "latest"
glow = "latest"
gum = "latest"
hyperfine = "latest"
jq = "latest"
jujutsu = "latest"
lua = "latest"
neovim = "latest"
node = "lts"
"npm:agent-browser" = "latest"
"npm:hunkdiff" = "latest"
python = "3.11"
ripgrep = "latest"
ruby = "3.4.6"
rust = "latest"
tmux = "latest"
usage = "latest"
watchexec = "latest"
yarn = "3.8.7"

[settings]
# Want to ignore macOS version of this file
ignored_config_paths = [
  "/Users/{{get_env(name='USER')}}/.config/mise/config.toml"
]
idiomatic_version_file_enable_tools = ["ruby", "node", "java"]

[env]
_.file = [
  "~/.secrets"
]
_.path = [
  "/opt/oracle/instantclient", 
   # So we can find the `fdfind` program as `fd`
  "/usr/lib/cargo/bin",
]

LD_LIBRARY_PATH = "/opt/oracle/instantclient"

